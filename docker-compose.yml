version: "3.9"

services:
  # ─── Backend (Node.js) ───
  backend:
    build: ./back
    container_name: wararchive-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./back/data:/app/data

  # ─── Nginx (Reverse Proxy + Static) ───
  nginx:
    image: nginx:stable-alpine
    container_name: wararchive-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./front:/usr/share/nginx/html/front:ro
      - ./back/data:/usr/share/nginx/html/back/data:ro
