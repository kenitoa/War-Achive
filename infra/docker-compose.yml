# ============================================================
# WAR ARCHIVE - Docker Compose 설정
# front: NAS WebStation에서 직접 서비스 (Docker 밖)
# back, mysql, nginx: Docker 컨테이너로 운영
# ============================================================

services:
  # ── MySQL 데이터베이스 ──
  mysql:
    image: mysql:8.0
    container_name: wararchive-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../data/db:/docker-entrypoint-initdb.d:ro
    networks:
      - wararchive-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API 서버 ──
  backend:
    build:
      context: ../back
      dockerfile: Dockerfile
    container_name: wararchive-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      LOG_DIR: /app/data/logs
      UPLOAD_DEST: /app/data/uploads
      PRIVATE_JSON_DIR: /app/data/private-json
    volumes:
      - ../data/logs:/app/data/logs
      - ../data/uploads:/app/data/uploads
      - ../data/private-json:/app/data/private-json
      - ../data/cache:/app/data/cache
    networks:
      - wararchive-net

  # ── Nginx 리버스 프록시 (API용) ──
  nginx:
    image: nginx:alpine
    container_name: wararchive-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - wararchive-net

volumes:
  mysql_data:
    driver: local

networks:
  wararchive-net:
    driver: bridge
