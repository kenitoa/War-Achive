<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAR ARCHIVE — 로그인</title>
  <link rel="stylesheet" href="../css/pages/login.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../main.html" class="logo">
        <div class="logo-icon">&#9876;</div>
        <span class="logo-text">War Archive</span>
      </a>
      <nav class="nav-links">
        <a href="../main.html#categories">아카이브</a>
        <a href="../main.html#timeline">연대기</a>
        <a href="../main.html#search">검색</a>
        <a href="../main.html#project">프로젝트</a>
      </nav>
      <button class="menu-toggle" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ── Login Section ── -->
  <section class="login-section">
    <div class="login-bg"></div>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo">&#9876;</div>
          <h1 class="login-title">War Archive</h1>
          <p class="login-subtitle" id="formSubtitle">계정에 로그인하세요</p>
        </div>

        <!-- 로그인 폼 -->
        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label for="username" class="form-label">사용자명</label>
            <div class="input-wrap">
              <span class="input-icon">&#128100;</span>
              <input type="text" id="username" name="username" class="form-input" placeholder="사용자명을 입력하세요" required autocomplete="username">
            </div>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">비밀번호</label>
            <div class="input-wrap">
              <span class="input-icon">&#128274;</span>
              <input type="password" id="password" name="password" class="form-input" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
              <button type="button" class="toggle-password" id="togglePassword" aria-label="비밀번호 표시">
                <span class="eye-icon" id="eyeIcon">&#128065;</span>
              </button>
            </div>
          </div>

          <!-- 회원가입 시 추가 필드 -->
          <div class="form-group" id="confirmPasswordGroup" style="display:none;">
            <label for="confirmPassword" class="form-label">비밀번호 확인</label>
            <div class="input-wrap">
              <span class="input-icon">&#128274;</span>
              <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password">
            </div>
          </div>

          <div class="form-error" id="formError"></div>

          <button type="submit" class="btn-login" id="submitBtn">로그인</button>
        </form>

        <div class="login-footer">
          <p class="toggle-text">
            <span id="toggleQuestion">계정이 없으신가요?</span>
            <button type="button" class="toggle-link" id="toggleMode">회원가입</button>
          </p>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-bottom">
        <p>&copy; 2026 War Archive. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="../js/pages/login.js"></script>
</body>
</html>
