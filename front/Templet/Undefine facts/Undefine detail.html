<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAR ARCHIVE — 미확인 자료 상세</title>
  <link rel="stylesheet" href="../../Style/Undefine facts style/Undefine detail style.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../main.html" class="logo">
        <div class="logo-icon">&#9876;</div>
        <span class="logo-text">War Archive</span>
      </a>
      <nav class="nav-links">
        <a href="../main.html#categories">아카이브</a>
        <a href="../main.html#timeline">연대기</a>
        <a href="../main.html#search">검색</a>
        <a href="Undefine facts.html" class="active">미확인 자료집</a>
      </nav>
      <button class="menu-toggle" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ── Newspaper Layout ── -->
  <main class="newspaper" id="newspaper">

    <!-- 신문 상단 마스트헤드 -->
    <div class="masthead">
      <div class="masthead-rule"></div>
      <div class="masthead-top">
        <span class="masthead-date" id="pubDate"></span>
        <span class="masthead-edition">미확인 자료 특별판</span>
      </div>
      <h1 class="masthead-title">WAR ARCHIVE GAZETTE</h1>
      <div class="masthead-subtitle">미확인 전쟁사료 조사보고</div>
      <div class="masthead-meta">
        <span id="shelfBadge" class="masthead-shelf"></span>
        <span class="masthead-sep">|</span>
        <span id="statusBadge" class="masthead-status"></span>
        <span class="masthead-sep">|</span>
        <span id="eraBadge" class="masthead-era"></span>
      </div>
      <div class="masthead-rule"></div>
    </div>

    <!-- 헤드라인 -->
    <section class="headline-section">
      <h2 class="headline" id="headline"></h2>
      <p class="headline-en" id="headlineEn"></p>
      <div class="byline">
        <span class="byline-origin">발원지: <strong id="originText"></strong></span>
        <span class="byline-sep">&#9670;</span>
        <span class="byline-discovered">발견 시기: <strong id="discoveredText"></strong></span>
        <span class="byline-sep">&#9670;</span>
        <span class="byline-credibility">신뢰도: <span id="credDots" class="cred-dots"></span></span>
      </div>
    </section>

    <div class="newspaper-columns">
      <!-- 좌측 메인 기사 -->
      <article class="main-article">
        <div class="lead-text" id="leadText"></div>
        <div class="article-body" id="articleBody">
          <!-- JS가 content 문단들을 삽입 -->
        </div>

        <!-- 편집자 주 -->
        <aside class="editor-box" id="editorBox">
          <div class="editor-box-header">
            <span class="editor-icon">&#9998;</span>
            <span>편집자 주</span>
          </div>
          <p id="editorNote"></p>
        </aside>
      </article>

      <!-- 우측 사이드바 -->
      <aside class="sidebar">
        <!-- 태그 클리핑 -->
        <div class="sidebar-section tags-section">
          <h4 class="sidebar-heading">&#128278; 분류 태그</h4>
          <div class="tags-container" id="tagsContainer"></div>
        </div>

        <!-- 역사적 의의 -->
        <div class="sidebar-section significance-section">
          <h4 class="sidebar-heading">&#9733; 역사적 의의</h4>
          <p id="significanceText" class="sidebar-text"></p>
        </div>

        <!-- 논쟁 사항 -->
        <div class="sidebar-section controversy-section">
          <h4 class="sidebar-heading">&#9888; 논쟁 사항</h4>
          <p id="controversyText" class="sidebar-text"></p>
        </div>

        <!-- 관련 자료 -->
        <div class="sidebar-section related-section" id="relatedSection">
          <h4 class="sidebar-heading">&#128279; 관련 자료</h4>
          <div id="relatedList" class="related-list"></div>
        </div>
      </aside>
    </div>

    <!-- 하단 네비게이션 -->
    <div class="paper-footer">
      <div class="paper-footer-rule"></div>
      <div class="paper-footer-inner">
        <a href="Undefine facts.html" class="back-link">&#8592; 미확인 자료집으로 돌아가기</a>
        <span class="paper-footer-copy">&copy; 2026 War Archive Gazette. All rights reserved.</span>
      </div>
    </div>

  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-top">
        <a href="../main.html" class="logo">
          <div class="logo-icon">&#9876;</div>
          <span class="logo-text">War Archive</span>
        </a>
        <nav class="footer-nav">
          <a href="../main.html#categories">아카이브</a>
          <a href="../main.html#timeline">연대기</a>
          <a href="../information.html">소개</a>
          <a href="../contribution.html">기여하기</a>
        </nav>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 War Archive. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="../../tech/Undefine facts tech/Undefine detail tech.js"></script>
</body>
</html>
